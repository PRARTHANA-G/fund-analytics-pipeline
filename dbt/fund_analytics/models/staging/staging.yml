# models/staging/staging.yml
version: 2
 
models:
  - name: stg_fund_prices
    description: "Cleaned, deduplicated fund price data"
    columns:
      - name: ticker
        tests:
          - not_null
          - accepted_values:
              values: ['SPY','IVV','EEM','AGG','VGK']
      - name: trade_date
        tests:
          - not_null
      - name: adj_close
        tests:
          - not_null
      - name: volume
        tests:
          - not_null
 
  - name: stg_exchange_rates
    description: "Cleaned, deduplicated exchange rates"
    columns:
      - name: currency
        tests:
          - not_null
      - name: rate_date
        tests:
          - not_null
